name: Docker push
on:
    workflow_call:
        inputs:
            tag:
                required: true
                type: string 

env:
    RELEASE_BRANCH: feature/test-workflow
    REPO_NAME: ${{ github.event.repository.name }}


jobs:
    docker-push:
        name: (CI) Docker push
        permissions:
            contents: write
            pull-requests: write
            repository-projects: write
            id-token: write
        runs-on: ubuntu-latest            
        steps:
        -   name: Prepare env 
            run: | 
                echo "show variables"
                echo [${{inputs.tag}}]
        -   name: Сheckout on [${{env.RELEASE_BRANCH}}] and v [${{inputs.tag}}]
            uses: actions/checkout@v4

        -   name: Log in to Docker Hub
            uses: docker/login-action@v3
            with:
                username: ${{ secrets.DOCKER_HUB_LOGIN }}
                password: ${{ secrets.DOCKER_HUB_PASSWORD }}

        -   name: Build and push Docker image to DockerHub
            uses: docker/build-push-action@v2
            with:
                context: .
                file: ./dockerfile
                push: true
                tags: ${{ secrets.DOCKER_HUB_LOGIN }}/${{env.REPO_NAME}}:v${{inputs.tag}}

        # update info about docker Readme file and description
        -   name: Docker Hub Description
            uses: peter-evans/dockerhub-description@v4
            with:
                username: ${{ secrets.DOCKER_HUB_LOGIN }}
                password: ${{ secrets.DOCKER_HUB_PASSWORD }}
                repository: ${{ secrets.DOCKER_HUB_LOGIN }}/${{env.CONTAINER_NAME}}
                short-description: ${{ github.event.repository.description }}
                readme-filepath: ./README.md
                enable-url-completion: true
        
        # add label to PR 
        -   uses: actions/github-script@v7
            with:
                script: |
                    github.rest.issues.addLabels({
                    issue_number: context.issue.number,
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    labels: ['dockerhub','${{inputs.tag}}']
                    })