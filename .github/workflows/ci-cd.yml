name: Version update and deploy to Docker pipeline

on: 
  pull_request:
    types: [closed]
    branches:
    - feature/test-workflow
  workflow_dispatch: 


env:
  VERSION_CATALOG: ${{ github.workspace }}/version
  VERSION_SCRIPT: .github/workflows/version.py
  MINOR: minor
  PATCH: patch
  CHANGELOG_FILE: changedlog.md
  RELEASE_BRANCH: feature/test-workflow

jobs:
  pre-merge-check:
    name: (INF) Log Info
    runs-on: ubuntu-latest
    steps:
      - name: Get branch names
        id: branch-names
        uses: tj-actions/branch-names@v8

      - name: Log Info
        id: log-info
        run: |
          echo "EVENT NAME    : ${{ github.event_name }}"
          echo "CURRENT BRANCH: ${{ steps.branch-names.outputs.current_branch }}"
          echo "REF NAME      : ${{ github.ref_name }}"


  security:
    name: (SEC) Security
    needs: pre-merge-check
    uses: vakaheydev/land_devops/.github/workflows/security.yml@feature/change-workflow

  tests:
    name: (TST) Test
    needs: security
    uses: vakaheydev/land_devops/.github/workflows/test.yml@feature/change-workflow
    with:
      version: alpha

  update-version:
    name: (VER) Version UP
    needs: tests
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      tag: ${{steps.get-commit-txt.outputs.TAG_MSG}}
    steps:     
      - name: Сheckout on [${{ env.RELEASE_BRACH }}]
        uses: actions/checkout@v4
    
      - name: Get branch names
        id: branch-names
        uses: tj-actions/branch-names@v8

      - name: Print catalog's info
        run : |
          echo "path to version file ${{ env.VERSION_CATALOG }}"
          
      - name: Install and Setup python 
        uses: actions/setup-python@v1
        with:
          python-version: "3.10"
    
      - name: Update version [minor]
        if: startsWith(steps.branch-names.outputs.current_branch, 'feature')
        run: 
          python ${{ env.VERSION_SCRIPT }} ${{ env.VERSION_CATALOG }} upgrade_version ${{ env.MINOR }}
 
      - name: Update version [patch]
        if: startsWith(steps.branch-names.outputs.current_branch, 'hotfix')
        run:
          python ${{ env.VERSION_SCRIPT }} ${{ env.VERSION_CATALOG }} upgrade_version ${{ env.PATCH }}
      
      - name: Save Version and Log to env
        id: get-commit-txt
        run: | 
          COMMIT_MSG=$(python ${{ env.VERSION_SCRIPT }} ${{ env.VERSION_CATALOG }} get_last_log_msg)
          TAG_MSG=$(python ${{ env.VERSION_SCRIPT }} ${{ env.VERSION_CATALOG }} get_current_version)
          echo "COMMIT_MSG=${COMMIT_MSG}" >> $GITHUB_ENV
          echo "TAG_MSG=${TAG_MSG}" >> $GITHUB_ENV
          echo "TAG_MSG=${TAG_MSG}" >> $GITHUB_OUTPUT
      
      - name: Setup git config
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "<>"

      - name: Update [version] and put [tag]. Commit and push
        run: |
          git add .
          git commit -m "${{ env.COMMIT_MSG }}"
          git tag -a v${{ env.TAG_MSG }} -m "update tag"
          git push -u origin ${{ env.RELEASE_BRACH }} --tags 

  
  changelog:
    name: (VER) Changelog update
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
      id-token: write
    runs-on: ubuntu-latest
    needs: update-version
    steps:  
      - name: Сheckout on [${{ env.RELEASE_BRACH }}]
        uses: actions/checkout@v4

      - name: Pull commits
        run: 
          git pull
      
      - name: Update changelog.md
        run: | 
          echo "---" >> ${{ env.CHANGELOG_FILE }} 
          echo "#### [${{ needs.update-version.outputs.tag }}] - $(date +"%Y.%m.%d")    ${{ github.event.pull_request.head.ref }}" >> ${{env.CHANGELOG_FILE}} 
      
      - name: Setup git config
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "<>"
      
      - name: Commit and push
        run: |
          git add .
          git commit -m "[${{ needs.update-version.outputs.tag }}] ${{ env.CHAGELOG_FILE }}"
          git push -u origin ${{ env.RELEASE_BRACH }} --tags 

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CHANGELOG_FILE }}
          path: ${{ env.CHANGELOG_FILE }}

      - uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '${{ env.CHANGELOG_FILE }} был обновлен. Новая версия доступна в корне репозитория.'
            })

      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['changelog-${{ needs.update-version.outputs.tag }}']
            })

